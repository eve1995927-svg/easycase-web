<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>試用申請成功｜案場通</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--ink:#0F2237;--gold:#C8A44A;--gold-d:#9A7830;--gold-pale:#FFFBEE;--steel:#5B6B7A;--w:#fff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:var(--ink);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--w);color:var(--ink);border-radius:20px;padding:40px 32px;max-width:420px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.ico{font-size:3.2rem;margin-bottom:16px}
h1{font-size:1.4rem;font-weight:900;margin-bottom:10px}
p{color:var(--steel);font-size:.9rem;line-height:1.7;margin-bottom:24px}
.steps{text-align:left;background:var(--gold-pale);border-radius:12px;padding:18px 20px;margin-bottom:24px}
.steps div{font-size:.84rem;padding:5px 0;color:#4A4540}
.btn{display:inline-block;padding:13px 30px;background:var(--gold);color:var(--ink);border-radius:10px;font-weight:800;text-decoration:none;font-size:.9rem}
</style>
</head>
<body>
<div class="card">
  <div class="ico">🎉</div>
  <h1>申請完成！</h1>
  <p>我們已經收到你的試用申請，接下來這樣進行：</p>
  <div class="steps">
    <div>1️⃣ 我們會在 1 個工作天內用 Email 或電話聯繫你</div>
    <div>2️⃣ 幫你開通專屬的系統帳號</div>
    <div>3️⃣ 引導你完成第一次設定（新手精靈會帶著你走）</div>
    <div>4️⃣ 14 天免費試用期間有任何問題，隨時找我們</div>
  </div>
  <a href="index.html" class="btn">回到首頁</a>
</div>
</body>
</html>
