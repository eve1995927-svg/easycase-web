<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>開始使用｜案場通</title>
<style>
:root{
  --canvas:#F4F1FA; --fg:#332F3A; --muted:#635F69;
  --violet:#7C3AED; --violet-l:#A78BFA; --violet-d:#5B21B6;
  --emerald:#10B981; --emerald-l:#34D399;
  --bad:#DC2626; --bad-bg:#FEF2F2; --w:#fff;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans CJK TC',sans-serif;font-weight:500;background:var(--canvas);color:var(--fg);min-height:100vh;padding:40px 20px;-webkit-font-smoothing:antialiased}
.wrap{max-width:520px;margin:0 auto}
.logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:32px}
.logo-tile{width:44px;height:44px;border-radius:14px;background:linear-gradient(155deg,#8B5CF6,var(--violet) 60%,var(--violet-d));display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:6px 6px 14px rgba(91,33,182,.3)}
.logo-t{font-family:'Noto Sans CJK TC';font-weight:900;font-size:1.3rem}
.card{background:var(--w);border-radius:36px;padding:36px 32px;box-shadow:20px 20px 44px rgba(160,150,180,.22),-12px -12px 28px rgba(255,255,255,.9)}
.card h1{font-family:'Noto Sans CJK TC';font-weight:900;font-size:1.5rem;margin-bottom:6px;text-align:center}
.card p.sub{color:var(--muted);font-size:.9rem;font-weight:600;text-align:center;margin-bottom:26px}

.plans{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
.plan{border:2.5px solid #EDEAF5;border-radius:24px;padding:18px 20px;cursor:pointer;transition:all .2s;position:relative}
.plan:hover{border-color:var(--violet-l)}
.plan.sel{border-color:var(--violet);background:rgba(124,58,237,.04)}
.plan-top{display:flex;justify-content:space-between;align-items:center}
.plan-name{font-weight:900;font-size:1.02rem}
.plan-price{font-weight:900;font-size:1.15rem;color:var(--violet)}
.plan-price span{font-size:.75rem;font-weight:700;color:var(--muted)}
.plan-desc{font-size:.8rem;color:var(--muted);font-weight:600;margin-top:4px}
.plan-badge{position:absolute;top:-11px;left:20px;background:linear-gradient(155deg,#FBBF24,#F59E0B);color:#3A2400;font-weight:900;font-size:.68rem;padding:4px 12px;border-radius:14px}
.plan-radio{position:absolute;top:18px;right:20px;width:22px;height:22px;border-radius:50%;border:2.5px solid #DDD8E8;transition:all .2s}
.plan.sel .plan-radio{border-color:var(--violet);background:var(--violet);box-shadow:inset 0 0 0 4px #fff}

.field{margin-bottom:14px}
.field label{display:block;font-size:.8rem;font-weight:700;color:var(--muted);margin-bottom:6px}
.field input{width:100%;padding:13px 16px;border:2px solid #EDEAF5;border-radius:14px;font-size:.92rem;font-family:inherit;box-sizing:border-box;transition:border-color .2s}
.field input:focus{outline:none;border-color:var(--violet)}

.btn{width:100%;padding:17px;border:none;border-radius:20px;background:linear-gradient(155deg,var(--violet-l),var(--violet));color:#fff;font-weight:800;font-size:1rem;cursor:pointer;font-family:inherit;transition:all .2s;box-shadow:10px 10px 22px rgba(124,58,237,.3),inset 2px 2px 6px rgba(255,255,255,.3)}
.btn:hover{transform:translateY(-2px)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}

.fine{text-align:center;font-size:.78rem;color:var(--muted);font-weight:600;margin-top:16px;line-height:1.7}
.err{background:var(--bad-bg);color:var(--bad);border-radius:14px;padding:12px 16px;font-size:.85rem;font-weight:700;margin-bottom:16px;display:none}
.spin{width:16px;height:16px;border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;display:inline-block;animation:sp .7s linear infinite;vertical-align:-3px;margin-right:8px}
@keyframes sp{to{transform:rotate(360deg)}}
.back{display:block;text-align:center;margin-top:20px;font-size:.85rem;font-weight:700;color:var(--muted);text-decoration:none}
.back:hover{color:var(--violet)}
</style>
</head>
<body>
<div class="wrap">
  <a href="index.html" class="logo"><span class="logo-tile">🏗️</span><span class="logo-t">案場通</span></a>
  <div class="card">
    <h1>開始 14 天免費試用</h1>
    <p class="sub">選一個方案，填完資料就能開始，之後隨時可以更換方案</p>

    <div class="err" id="errBox"></div>

    <div class="plans" id="plans">
      <div class="plan" data-plan="light" data-amt="580" data-name="入門方案">
        <div class="plan-radio"></div>
        <div class="plan-top"><span class="plan-name">🏠 入門方案</span><span class="plan-price">NT$580<span>/月</span></span></div>
        <div class="plan-desc">案場無上限・報價合約・業主端分享・3人帳號</div>
      </div>
      <div class="plan sel" data-plan="full" data-amt="1280" data-name="全包方案">
        <div class="plan-badge">最多人選</div>
        <div class="plan-radio"></div>
        <div class="plan-top"><span class="plan-name">💎 全包方案</span><span class="plan-price">NT$1,280<span>/月</span></span></div>
        <div class="plan-desc">入門方案全部功能＋薪資休假・無上限帳號</div>
      </div>
      <div class="plan" data-plan="enterprise" data-amt="3980" data-name="企業方案">
        <div class="plan-radio"></div>
        <div class="plan-top"><span class="plan-name">🏢 企業方案</span><span class="plan-price">NT$3,980<span>/月</span></span></div>
        <div class="plan-desc">15人以內帳號・LINE官方帳號整合・優先客服</div>
      </div>
    </div>

    <div class="field">
      <label>公司名稱</label>
      <input type="text" id="companyName" placeholder="例：澤居室內裝修">
    </div>
    <div class="field">
      <label>聯絡 Email</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>
    <div class="field">
      <label>聯絡電話</label>
      <input type="tel" id="phone" placeholder="09xx-xxx-xxx">
    </div>

    <form id="signupForm" action="/.netlify/functions/newebpay-create-period" method="POST" target="_self">
      <input type="hidden" id="planField" name="plan" value="full">
      <input type="hidden" id="amtField" name="amt" value="1280">
      <input type="hidden" id="planNameField" name="planName" value="全包方案">
      <button type="submit" class="btn" id="submitBtn">開始免費試用 →</button>
    </form>
    <div class="fine">試用期間不會扣款・可以隨時取消<br>送出後會導向藍新金流頁面完成信用卡驗證（僅授權10元確認卡片有效，不會馬上收費）</div>
  </div>
  <a href="index.html" class="back">← 回到首頁</a>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const presetPlan = urlParams.get('plan');

const plans = document.querySelectorAll('.plan');
function selectPlan(el){
  plans.forEach(p => p.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('planField').value = el.dataset.plan;
  document.getElementById('amtField').value = el.dataset.amt;
  document.getElementById('planNameField').value = el.dataset.name;
}
plans.forEach(p => p.addEventListener('click', () => selectPlan(p)));

if (presetPlan) {
  const match = document.querySelector('.plan[data-plan="' + presetPlan + '"]');
  if (match) selectPlan(match);
}

document.getElementById('signupForm').addEventListener('submit', (e) => {
  const companyName = document.getElementById('companyName').value.trim();
  const email = document.getElementById('email').value.trim();
  const errBox = document.getElementById('errBox');

  errBox.style.display = 'none';
  if (!companyName || !email) {
    e.preventDefault();
    errBox.textContent = '請填入公司名稱和 Email';
    errBox.style.display = 'block';
    return;
  }

  const form = e.target;
  ['companyName', 'email', 'phone'].forEach((id) => {
    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = id;
    input.value = document.getElementById(id).value.trim();
    form.appendChild(input);
  });

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>處理中…';
});
</script>
</body>
</html>
